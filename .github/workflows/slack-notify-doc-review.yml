name: Notify Slack on Doc Review Request

on:
  pull_request:
    types: [review_requested]

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Debug event payload
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"
          echo "Requested team slug: ${{ github.event.requested_team.slug }}"
          echo "Requested team name: ${{ github.event.requested_team.name }}"
          echo "Requested reviewer: ${{ github.event.requested_reviewer.login }}"
          echo "Full event JSON:"
          echo '${{ toJSON(github.event) }}' | jq .
