name: Validate Diagram Anchors

# EDUENG-613
# For doc files with remote_include tags pulling from generated-diagrams
# grammar_svg, fetches each diagram HTML and verifies that every
# sql-grammar.html#ANCHOR reference resolves against stmt_block.html on the
# same branch.
#
# This is the exact failure that blocked production on 2026-01-29:
# show_statement_hints.html referenced sql-grammar.html#opt_with_show_hints_options
# but that anchor did not yet exist in stmt_block.html on release-26.1.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/current/**/*.md'
  schedule:
    # Daily at 07:15 UTC.
    - cron: '15 7 * * *'
  workflow_dispatch:

jobs:
  validate-diagram-anchors:
    name: Check SQL diagram anchors against stmt_block.html
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get changed files (PR only)
        id: changed-files
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@cc08e170f4447237bcaf8acaacfa615b9cb86612  # v35
        with:
          files: 'src/current/**/*.md'
          separator: ' '

      # PR: only scan changed .md files for speed.
      - name: Run anchor check (PR — changed files)
        id: validate-pr
        if: github.event_name == 'pull_request' && steps.changed-files.outputs.any_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS: 'true'
        run: |
          python .github/scripts/validate_diagram_anchors.py \
            ${{ steps.changed-files.outputs.all_changed_files }}
        continue-on-error: true

      # Scheduled / manual: full scan.
      - name: Run anchor check (full scan)
        id: validate-full
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS: 'true'
        run: python .github/scripts/validate_diagram_anchors.py
        continue-on-error: true

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- diagram-anchor-check -->';

            let body = marker + '\n';
            try {
              body += fs.readFileSync('pr-comment.md', 'utf8');
            } catch {
              body += '### Diagram Anchor Check\n\nCheck ran but could not generate a detailed report.';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on PR issues
        if: >
          github.event_name == 'pull_request' &&
          steps.changed-files.outputs.any_changed == 'true' &&
          steps.validate-pr.outcome == 'failure'
        run: |
          echo "Diagram anchor check failed. See the PR comment for details."
          exit 1

      - name: Open or update tracking issue (scheduled failure)
        if: github.event_name != 'pull_request' && steps.validate-full.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let detail = '';
            try {
              detail = fs.readFileSync('pr-comment.md', 'utf8');
            } catch {
              detail = `Check failed. See [workflow run](${runUrl}) for details.`;
            }

            const label = 'sql-diagram-validation';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Diagram anchor check failure (automated)',
                body: [
                  'Opened automatically by the nightly diagram anchor workflow.',
                  '',
                  detail,
                  '',
                  `[Workflow run](${runUrl})`,
                ].join('\n'),
                labels: [label],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `**Nightly update** — [run ${{ github.run_id }}](${runUrl}):\n\n${detail}`,
              });
            }
