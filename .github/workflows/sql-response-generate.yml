name: SQL Response Generate

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8am UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate for (e.g., v26.2)'
        required: true
        default: 'v26.2'

jobs:
  generate-responses:
    name: Generate SQL response blocks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v26.2" >> "$GITHUB_OUTPUT"
          fi

      - name: Install CockroachDB
        run: |
          curl https://binaries.cockroachdb.com/cockroach-v26.2.0.linux-amd64.tgz | tar -xz
          sudo cp cockroach-v26.2.0.linux-amd64/cockroach /usr/local/bin/

      - name: Start CockroachDB
        run: |
          cockroach start-single-node --insecure --background --store=type=mem,size=1GiB --listen-addr=localhost:26257
          sleep 5
          cockroach sql --insecure -e "SELECT 1;"

      - name: Run SQL response generator
        run: |
          python .github/scripts/sql_response_runner.py \
            --version ${{ steps.version.outputs.version }} \
            --update --verbose

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with updated responses
        if: steps.changes.outputs.changed == 'true'
        run: |
          DATE=$(date +%Y%m%d)
          BRANCH="auto/sql-responses-${DATE}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Auto-update SQL response output blocks

          Generated by sql_response_runner.py for ${{ steps.version.outputs.version }}."
          git push origin "$BRANCH"
          gh pr create \
            --title "Auto-update SQL response blocks (${{ steps.version.outputs.version }})" \
            --body "$(cat <<'EOF'
          ## Summary
          - Automatically regenerated SQL response output blocks for ${{ steps.version.outputs.version }}
          - Generated by the weekly \`sql-response-generate\` workflow

          ## Review checklist
          - [ ] Verify output changes look correct
          - [ ] Check that no non-deterministic output was accidentally included

          🤖 Generated automatically by [sql-response-generate](../actions/workflows/sql-response-generate.yml)
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop CockroachDB
        if: always()
        run: |
          cockroach quit --insecure --host=localhost:26257 || true
