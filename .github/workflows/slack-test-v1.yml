name: Slack Test V1 Simple

on:
  pull_request:
    types: [review_requested]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Step 3 - Multi-line script
        run: |
          TEAM="${{ github.event.requested_team.slug }}"
          echo "Team is $TEAM"
          if [ "$TEAM" = "docs-prs" ]; then
            echo "docs-prs was requested!"
          fi
